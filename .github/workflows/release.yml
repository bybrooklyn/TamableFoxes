# Builds the shaded plugin jar and attaches it to a GitHub Release when a
# version tag (e.g. v2.3.2-FOX) is pushed. Same build flow as build.yml.

name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Cache Gradle & paperweight
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            26_1_R1/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('26_1_R1/**/*.gradle*', '26_1_R1/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install parent POM + Utility to local repo
        run: |
          mvn -B -N install
          mvn -B -pl Utility install

      - name: Build Mojang-mapped 26.1.2 NMS module (paperweight)
        working-directory: 26_1_R1
        run: ./gradlew --no-daemon publishToMavenLocal

      - name: Package shaded plugin jar
        run: mvn -B -pl Plugin package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Plugin/target/TamableFoxes-v*.jar
          generate_release_notes: true
