# Builds the shaded plugin jar and publishes a GitHub Release named
# tamablefoxs<YYYYMMDD>, with the jar attached. Run it manually from the
# Actions tab (workflow_dispatch). Same build flow as build.yml.

name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute release name
        id: meta
        run: echo "name=tamablefoxs$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Cache Gradle & paperweight
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            26_1_R1/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('26_1_R1/**/*.gradle*', '26_1_R1/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Install parent POM + Utility to local repo
        run: |
          mvn -B -N install
          mvn -B -pl Utility install

      - name: Build Mojang-mapped 26.1.2 NMS module (paperweight)
        working-directory: 26_1_R1
        run: ./gradlew --no-daemon publishToMavenLocal

      - name: Package shaded plugin jar
        run: mvn -B -pl Plugin package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.name }}
          name: ${{ steps.meta.outputs.name }}
          files: Plugin/target/TamableFoxes-v*.jar
          generate_release_notes: true
          body: |
            Tamable Foxes for **Paper** — Minecraft **26.1.2** (Mojang-mapped).

            Drop the attached jar into your Paper server's `plugins/` folder and restart (Java 25+).
